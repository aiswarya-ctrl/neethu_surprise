<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Neethu!</title>
    <!-- Modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Step 1: Greeting -->
    <div id="step1" class="container active">
        <h1>Hi Neethu! 👋</h1>
        <p>I made this little surprise just for you. Are you ready?</p>
        <button id="nextBtn" class="btn">Show me! ✨</button>
    </div>

    <!-- Step 2: Funny Question -->
    <div id="step2" class="container">
        <h1>Hold on... 🧐</h1>
        <p>Before you proceed, answer this honestly:<br><br><strong>Are you secretly a monkey? 🐒</strong></p>
        <div class="actions">
            <button id="yesBtn" class="btn yes-btn">Yes, I am! 🍌</button>
            <button id="noBtn" class="btn no-btn">No, I'm not!</button>
        </div>
    </div>

    <!-- Step 3: Wishes -->
    <div id="step3" class="container">
        <h1>I knew it!! 😂</h1>
        <p>Here, have some bananas! 🍌🍌</p>
        <h1 class="vishu-text">Sleep well! <br>🌙 Good Night Neethu! 🌙</h1>
        <div class="emoji-container">
            <span class="emoji">🌌</span>
            <span class="emoji">💤</span>
            <span class="emoji">✨</span>
            <span class="emoji">🦉</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
